name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary: springcraft-linux
          - os: macos-latest
            binary: springcraft-macos
          - os: windows-latest
            binary: springcraft-win.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install esbuild
        run: npm install esbuild

      - name: Bundle with esbuild
        run: npx esbuild bin/index.js --bundle --platform=node --outfile=dist/bundle.cjs --format=cjs --external:@clack/prompts --external:fs-extra --external:unzipper

      - name: Build with pkg
        run: npx pkg dist/bundle.cjs --targets node18-${{ matrix.os == 'ubuntu-latest' && 'linux' || matrix.os == 'macos-latest' && 'macos' || 'win' }}-x64 -o dist/${{ matrix.binary }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: dist/${{ matrix.binary }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update checksums in formula
        run: |
          LINUX_SHA=$(sha256sum dist/springcraft-linux | cut -d' ' -f1)
          MACOS_SHA=$(shasum -a 256 dist/springcraft-macos | cut -d' ' -f1)
          echo "Linux: $LINUX_SHA"
          echo "macOS: $MACOS_SHA"
          # The formula will be updated separately after release

      - name: Create Pull Request for Homebrew
        if: github.event_name == 'push'
        run: |
          # This will be handled manually or via separate workflow
          echo "Update homebrew-springcraft Formula with new checksums"
